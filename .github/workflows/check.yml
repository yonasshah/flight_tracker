name: Check Flight Prices

on:
  schedule:
    # Runs every 6 hours (UTC). GitHub may delay this by a few minutes.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run price checker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python check_prices.py